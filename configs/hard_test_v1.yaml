project_name: technical-supervision-issue-classifier-hard-test-v1

task:
  type: single_label_classification
  target_name: problem_category
  text_field: text
  label_field: label
  label_list: []
  extra_fields:
    - device_type
    - specialty
    - supervision_stage
    - event_time
    - source_unit
    - data_source

data:
  input_path: null
  file_type: csv
  train_path: data/generated/train_synthetic_v2.csv
  valid_path: data/generated/valid_synthetic_v2.csv
  test_path: data/generated/hard_test_v1.csv

preprocess:
  strip: true
  lowercase: false
  normalize_punctuation: true
  terminology_map: {}

input_builder:
  enabled: true
  output_field: model_input
  structured_fields:
    - device_type
    - specialty
    - supervision_stage
  field_aliases:
    text: 问题文本
    device_type: 设备类型
    specialty: 专业类别
    supervision_stage: 监督环节
    event_time: 时间
    source_unit: 来源单位
  key_value_sep: ": "
  field_sep: "；"
  include_text_field_name: true
  skip_empty_fields: true

model:
  model_name_or_path: hfl/chinese-roberta-wwm-ext
  max_length: 128
  problem_type: single_label_classification

train:
  output_dir: artifacts/outputs_hard_test_v1
  logging_dir: artifacts/logs_hard_test_v1
  num_train_epochs: 3
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  evaluation_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: macro_f1
  greater_is_better: true
  logging_steps: 20
  seed: 42
  fp16: false
  report_to: []

predict:
  batch_size: 32
  threshold: 0.5
  output_dir: artifacts/predictions_hard_test_v1
